<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordLab · 관리자 대시보드</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== 비밀번호 게이트 ===== -->
  <section class="gate" id="gate">
    <span class="kicker">Admin</span>
    <h1>관리자 대시보드</h1>
    <p>선생님·운영자 전용입니다.<br>비밀번호를 입력하세요.</p>
    <input type="password" id="pw" placeholder="비밀번호" autocomplete="current-password"/>
    <div class="err" id="gateErr"></div>
    <button class="btn solid" id="enterBtn">들어가기</button>
  </section>

  <!-- ===== 대시보드 ===== -->
  <section class="dash hidden" id="dash">
    <header class="top">
      <div class="kicker">Admin · Level 3</div>
      <h1>학생 진도 현황</h1>
      <div class="sub" id="liveWrap"><span class="livebadge" id="liveBadge"><span class="livedot"></span>실시간 연결됨</span></div>
    </header>

    <div class="dashstats" id="kpis"></div>

    <div class="toolbar">
      <input type="search" id="search" placeholder="이메일 검색…"/>
      <div style="display:flex;gap:8px">
        <button class="btn" id="refreshBtn" style="font-size:13px;padding:8px 14px">새로고침</button>
        <a class="btn" href="index.html" style="font-size:13px;padding:8px 14px;text-decoration:none">← 학습 앱</a>
      </div>
    </div>

    <div class="tablewrap">
      <table class="dashtbl" id="tbl">
        <thead>
          <tr>
            <th data-sort="email">이메일</th>
            <th data-sort="known_count">익힌 단어</th>
            <th data-sort="quiz_score">퀴즈 최고</th>
            <th data-sort="dict_score">받아쓰기 최고</th>
            <th data-sort="updated_at">최근 활동</th>
          </tr>
        </thead>
        <tbody id="rows"><tr><td colspan="5" class="empty">불러오는 중…</td></tr></tbody>
      </table>
    </div>

    <!-- Supabase 미설정 시 폴백: 진도 코드 붙여넣기 -->
    <div class="admin hidden" id="codeFallback">
      <h3>코드로 진도 확인 (Supabase 미설정 모드)</h3>
      <p>Supabase 설정이 비어 있어 실시간 조회가 꺼져 있습니다. 학생이 보낸 진도 코드를 붙여넣어 확인하세요. (실시간 전체 현황을 보려면 <code>js/config.js</code>에 Supabase 정보를 입력하세요.)</p>
      <div class="arow">
        <input id="codeIn" placeholder="진도 코드 붙여넣기"/>
        <button class="btn solid" id="codeBtn">확인</button>
      </div>
      <div class="code" id="codeOut" style="margin-top:10px">—</div>
    </div>
  </section>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script>
  const $ = s=>document.querySelector(s);
  const TOTAL_DEFAULT = 200;
  let rowsData = [];
  let sortKey = 'updated_at', sortDir = -1;  // 기본: 최근 활동 내림차순

  function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1700); }

  /* ---- 비밀번호 게이트 ---- */
  function tryEnter(){
    const pw = $('#pw').value;
    if(pw === window.WORDLAB_CONFIG.ADMIN_PASSWORD){
      $('#gate').classList.add('hidden');
      $('#dash').classList.remove('hidden');
      initDash();
    }else{
      $('#gateErr').textContent = '비밀번호가 올바르지 않습니다.';
    }
  }
  $('#enterBtn').onclick = tryEnter;
  $('#pw').addEventListener('keydown', e=>{ if(e.key==='Enter') tryEnter(); });

  /* ---- 시간 표기 ---- */
  function timeAgo(iso){
    if(!iso) return '—';
    const d = new Date(iso), now = new Date();
    const s = Math.floor((now-d)/1000);
    if(s<60) return '방금';
    if(s<3600) return Math.floor(s/60)+'분 전';
    if(s<86400) return Math.floor(s/3600)+'시간 전';
    if(s<604800) return Math.floor(s/86400)+'일 전';
    return iso.slice(0,10);
  }

  /* ---- KPI ---- */
  function renderKpis(){
    const n = rowsData.length;
    const avgKnown = n ? Math.round(rowsData.reduce((a,r)=>a+(r.known_count||0),0)/n) : 0;
    const bestQuiz = n ? Math.max(...rowsData.map(r=>r.quiz_score||0)) : 0;
    const active = rowsData.filter(r=>{
      if(!r.updated_at) return false;
      return (Date.now()-new Date(r.updated_at)) < 7*86400*1000;
    }).length;
    $('#kpis').innerHTML = `
      <div class="kpi"><div class="num">${n}</div><div class="lbl">전체 학생</div></div>
      <div class="kpi"><div class="num">${active}</div><div class="lbl">최근 7일 활동</div></div>
      <div class="kpi"><div class="num">${avgKnown}</div><div class="lbl">평균 익힌 단어</div></div>
      <div class="kpi"><div class="num">${bestQuiz}</div><div class="lbl">퀴즈 최고점</div></div>`;
  }

  /* ---- 표 ---- */
  function renderRows(flashEmail){
    const q = ($('#search').value||'').trim().toLowerCase();
    let list = rowsData.slice();
    if(q) list = list.filter(r=>(r.email||'').toLowerCase().includes(q));
    list.sort((a,b)=>{
      let x=a[sortKey], y=b[sortKey];
      if(sortKey==='email'){ x=(x||'').toLowerCase(); y=(y||'').toLowerCase(); return x<y?-sortDir:x>y?sortDir:0; }
      if(sortKey==='updated_at'){ x=x?new Date(x).getTime():0; y=y?new Date(y).getTime():0; }
      x=x||0; y=y||0;
      return (x-y)*sortDir;
    });
    const tb=$('#rows');
    if(!list.length){ tb.innerHTML='<tr><td colspan="5" class="empty">아직 학생 데이터가 없습니다.</td></tr>'; return; }
    tb.innerHTML = list.map(r=>{
      const total = r.total || TOTAL_DEFAULT;
      const kc = r.known_count||0;
      const pct = Math.round(kc/total*100);
      const fl = (flashEmail && r.email===flashEmail) ? ' class="flash"' : '';
      return `<tr${fl}>
        <td class="email">${r.email||''}</td>
        <td><span class="mini"><span class="minifill" style="width:${pct}%"></span></span><span class="pct">${kc}/${total}</span></td>
        <td>${r.quiz_score||0}</td>
        <td>${r.dict_score||0}</td>
        <td class="ago">${timeAgo(r.updated_at)}</td>
      </tr>`;
    }).join('');
  }

  function renderAll(flashEmail){ renderKpis(); renderRows(flashEmail); }

  /* ---- Supabase 조회 + 실시간 ---- */
  async function fetchAll(){
    const { data, error } = await window.supa.from('progress').select('*');
    if(error){ toast('조회 오류: '+error.message); return; }
    rowsData = data||[];
    renderAll();
  }

  function subscribeRealtime(){
    window.supa.channel('progress-live')
      .on('postgres_changes', { event:'*', schema:'public', table:'progress' }, payload=>{
        const row = payload.new || payload.old;
        if(!row) return;
        const i = rowsData.findIndex(r=>r.email===row.email);
        if(payload.eventType==='DELETE'){ if(i>=0) rowsData.splice(i,1); }
        else if(i>=0){ rowsData[i]=row; } else { rowsData.push(row); }
        renderAll(row.email);
      })
      .subscribe(status=>{
        const b=$('#liveBadge');
        if(status==='SUBSCRIBED'){ b.className='livebadge'; b.innerHTML='<span class="livedot"></span>실시간 연결됨'; }
        else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'){ b.className='livebadge off'; b.innerHTML='<span class="livedot"></span>실시간 끊김 — 새로고침 사용'; }
      });
  }

  /* ---- 코드 폴백 모드 ---- */
  function initCodeFallback(){
    $('#liveBadge').className='livebadge off';
    $('#liveBadge').innerHTML='<span class="livedot"></span>Supabase 미설정 — 코드 모드';
    $('#rows').innerHTML='<tr><td colspan="5" class="empty">Supabase가 설정되지 않아 실시간 목록이 없습니다.<br>아래에서 진도 코드로 확인하세요.</td></tr>';
    $('#kpis').innerHTML='';
    $('#codeFallback').classList.remove('hidden');
    $('#codeBtn').onclick=()=>{
      const v=$('#codeIn').value.trim(); if(!v){ toast('코드를 붙여넣어 주세요.'); return; }
      try{
        const d=JSON.parse(decodeURIComponent(escape(atob(v))));
        const learned = (d.learned!==undefined ? d.learned : d.known);
        $('#codeOut').innerHTML=`<b>${d.email||'(이메일 없음)'}</b> · 날짜 ${d.date}<br>익힘 ${learned}/${d.total}${d.mastered!==undefined?' · 마스터 '+d.mastered:''} · 퀴즈 최고 ${d.quiz} · 받아쓰기 최고 ${d.dict}`;
      }catch(e){ toast('코드 형식이 올바르지 않아요.'); }
    };
  }

  /* ---- 정렬 헤더 + 검색 ---- */
  document.querySelectorAll('#tbl th').forEach(th=>{
    th.onclick=()=>{
      const k=th.dataset.sort;
      if(sortKey===k) sortDir=-sortDir; else { sortKey=k; sortDir = (k==='email')?1:-1; }
      renderRows();
    };
  });
  $('#search').addEventListener('input', ()=>renderRows());
  $('#refreshBtn').onclick=()=>{ if(window.supa){ fetchAll(); toast('새로고침했어요.'); } };

  /* ---- 진입 ---- */
  function initDash(){
    if(window.supa){
      fetchAll();
      subscribeRealtime();
    }else{
      initCodeFallback();
    }
  }
  </script>
</body>
</html>
